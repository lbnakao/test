<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>タスクシート</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* 追加フォーム */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-form input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }

    .add-form input:focus {
      border-color: #667eea;
    }

    .add-form button {
      padding: 12px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.2s;
      min-width: 48px;
    }

    .add-form button:active {
      background: #5563c1;
    }

    /* フィルタ */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 8px 4px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #666;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
      font-weight: 600;
    }

    /* タスクリスト */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      background: #fff;
      border-radius: 14px;
      padding: 14px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      transition: opacity 0.2s;
    }

    .task-item.done {
      opacity: 0.5;
    }

    /* チェックボックス */
    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #667eea;
      background: #fff;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }

    .task-item.done .check-btn {
      background: #667eea;
      color: #fff;
    }

    .task-text {
      flex: 1;
      font-size: 15px;
      color: #1a1a2e;
      word-break: break-all;
      line-height: 1.4;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #999;
    }

    /* 優先度バッジ */
    .priority-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
      font-weight: 600;
    }

    .priority-btn.high   { background: #ffe0e0; color: #d32f2f; }
    .priority-btn.medium { background: #fff3e0; color: #e65100; }
    .priority-btn.low    { background: #e8f5e9; color: #2e7d32; }

    /* 削除ボタン */
    .del-btn {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #ccc;
      flex-shrink: 0;
      padding: 4px;
      line-height: 1;
    }

    .del-btn:active { color: #e53935; }

    /* 空状態 */
    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 15px;
    }

    /* 完了済みをまとめて削除 */
    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 14px;
      color: #e53935;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:active { background: #ffebee; }
  </style>
</head>
<body>

<h1>タスクシート</h1>

<div class="add-form">
  <input id="new-task" type="text" placeholder="タスクを入力..." maxlength="100">
  <button onclick="addTask()">＋</button>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
  <button class="filter-btn" onclick="setFilter('todo', this)">未完了</button>
  <button class="filter-btn" onclick="setFilter('done', this)">完了</button>
</div>

<div class="task-list" id="task-list"></div>

<button class="clear-btn" onclick="clearDone()">完了済みを削除</button>

<script>
  const STORAGE_KEY = 'tasks_v1';
  let filter = 'all';

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function save(tasks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function render() {
    const tasks = load();
    const list  = document.getElementById('task-list');
    const filtered = tasks.filter(t => {
      if (filter === 'todo') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">タスクがありません</div>';
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
        <button class="check-btn" onclick="toggleDone(${t.id})">${t.done ? '✓' : ''}</button>
        <span class="task-text">${escHtml(t.text)}</span>
        <button class="priority-btn ${t.priority}" onclick="cyclePriority(${t.id})">${priorityLabel(t.priority)}</button>
        <button class="del-btn" onclick="deleteTask(${t.id})">×</button>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function priorityLabel(p) {
    return { high: '高', medium: '中', low: '低' }[p] || '中';
  }

  function addTask() {
    const input = document.getElementById('new-task');
    const text  = input.value.trim();
    if (!text) return;
    const tasks = load();
    tasks.unshift({ id: Date.now(), text, done: false, priority: 'medium' });
    save(tasks);
    input.value = '';
    render();
  }

  function toggleDone(id) {
    const tasks = load();
    const t = tasks.find(t => t.id === id);
    if (t) t.done = !t.done;
    save(tasks);
    render();
  }

  function cyclePriority(id) {
    const order = ['high', 'medium', 'low'];
    const tasks = load();
    const t = tasks.find(t => t.id === id);
    if (t) {
      const i = order.indexOf(t.priority);
      t.priority = order[(i + 1) % order.length];
    }
    save(tasks);
    render();
  }

  function deleteTask(id) {
    const tasks = load().filter(t => t.id !== id);
    save(tasks);
    render();
  }

  function clearDone() {
    if (!confirm('完了済みのタスクをすべて削除しますか？')) return;
    save(load().filter(t => !t.done));
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // Enterキーで追加
  document.getElementById('new-task').addEventListener('keypress', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
